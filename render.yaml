services:
  # Backend Web Service
  - type: web
    name: timetable-backend
    env: python
    runtime: python-3.12.0
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --chdir backend app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: timetable-db
          property: connectionString
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false

databases:
  # PostgreSQL Database
  - name: timetable-db
    databaseName: timetable
    user: timetable_user
    region: oregon
